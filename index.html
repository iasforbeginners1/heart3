<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Mastery Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff4757; --green: #2ecc71; --dark: #0a0a0c; }
        body { font-family: 'Exo 2', sans-serif; background: var(--dark); color: white; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* Screen Transitions */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s ease; background: var(--dark); z-index: 10; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.9); }

        /* Start Screen */
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 85%; max-width: 500px; }
        h1 { font-size: 3rem; color: var(--red); margin: 0; text-shadow: 0 0 15px rgba(255,71,87,0.3); }
        .btn { background: var(--red); color: white; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: 900; border-radius: 50px; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn:disabled { background: #555; cursor: not-allowed; }

        /* Game HUD */
        .hud { display: flex; gap: 40px; margin-bottom: 15px; font-size: 1.3rem; font-weight: 900; background: rgba(255,255,255,0.1); padding: 10px 40px; border-radius: 50px; }
        
        /* Label Bank */
        .bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 900px; margin-bottom: 20px; }
        .chip { padding: 10px 18px; background: transparent; border: 2px solid var(--red); color: var(--red); border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .chip.active { background: var(--red); color: white; box-shadow: 0 0 15px var(--red); }
        .chip.done { opacity: 0; pointer-events: none; }

        /* Board Container */
        .board-wrapper { position: relative; width: 900px; height: 600px; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); overflow: hidden; border: 5px solid #222; }
        #heart-img { width: 100%; height: 100%; object-fit: contain; }

        /* Interactive Zones */
        .zone { position: absolute; border: 2px dashed rgba(255, 71, 87, 0.3); background: rgba(255, 255, 255, 0.6); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-size: 12px; color: #666; font-weight: bold; }
        .zone:hover { background: rgba(255, 71, 87, 0.1); border-color: var(--red); }
        .zone.filled { background: var(--green) !important; border: 2px solid #16a085 !important; color: white !important; font-size: 14px; text-align: center; }

        /* Coordinates (Calibrated for image_9fb95e.png) */
        .z1 { top: 12%; left: 3%; width: 22%; height: 12%; } /* Brachiocephalic vein */
        .z2 { top: 46%; left: 3%; width: 20%; height: 10%; } /* Right Atrium */
        .z3 { top: 82%; left: 10%; width: 22%; height: 10%; } /* Left Atrium (Lower) */
        .z4 { top: 15%; left: 74%; width: 22%; height: 9%; }  /* Pulmonary Truck */
        .z5 { top: 36%; left: 74%; width: 20%; height: 9%; }  /* Left Atrium (Upper) */
        .z6 { top: 62%; left: 74%; width: 20%; height: 9%; }  /* Left Ventricle */
        .z7 { top: 84%; left: 74%; width: 22%; height: 9%; }  /* Top of the Heart */

        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-5px,0); } 75% { transform: translate(5px,0); } }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>

    <div id="scr-start" class="screen">
        <div class="glass-card">
            <h1>HEART FLOW</h1>
            <p style="color: #aaa;">Sahi labels ko unki jagah par fit karein.</p>
            <p id="loading-text">Loading Assets...</p>
            <button id="start-btn" class="btn" onclick="initGame()" disabled>START MISSION</button>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div class="hud">
            <div id="timer">01:00</div>
            <div id="score">Mastery: 0/7</div>
        </div>

        <div class="bank" id="bank">
            <button class="chip" onclick="pick('l1', this)">Brachiocephalic Vein</button>
            <button class="chip" onclick="pick('l2', this)">Right Atrium</button>
            <button class="chip" onclick="pick('l3', this)">Left Atrium</button>
            <button class="chip" onclick="pick('l4', this)">Pulmonary Truck</button>
            <button class="chip" onclick="pick('l5', this)">Left Atrium</button>
            <button class="chip" onclick="pick('l6', this)">Left Ventricle</button>
            <button class="chip" onclick="pick('l7', this)">Top of the Heart</button>
        </div>

        <div class="board-wrapper" id="board">
            <img id="heart-img" src="heart_blank.png" onload="enableStart()">
            
            <div class="zone z1" onclick="check('l1', this)">DROP</div>
            <div class="zone z2" onclick="check('l2', this)">DROP</div>
            <div class="zone z3" onclick="check('l3', this)">DROP</div>
            <div class="zone z4" onclick="check('l4', this)">DROP</div>
            <div class="zone z5" onclick="check('l5', this)">DROP</div>
            <div class="zone z6" onclick="check('l6', this)">DROP</div>
            <div class="zone z7" onclick="check('l7', this)">DROP</div>
        </div>
    </div>

    <div id="scr-end" class="screen hidden">
        <div class="glass-card">
            <h2 id="res-title">MISSION OVER</h2>
            <p id="res-msg"></p>
            <button class="btn" onclick="location.reload()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        let selectedId = null;
        let selectedBtn = null;
        let score = 0;
        let timeLeft = 60;
        let timerActive = false;
        let audioCtx = null;

        // Enable Start Button after image loads
        function enableStart() {
            document.getElementById('start-btn').disabled = false;
            document.getElementById('loading-text').innerText = "Assets Loaded!";
        }

        // Sound System (Resume on click)
        function playBeep(freq, type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(g);
            g.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function initGame() {
            // Mobile audio unlock
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioCtx.resume();

            document.getElementById('scr-start').classList.add('hidden');
            document.getElementById('scr-game').classList.remove('hidden');
            timerActive = true;
            runTimer();
        }

        function runTimer() {
            if(!timerActive) return;
            const tEl = document.getElementById('timer');
            let m = Math.floor(timeLeft/60);
            let s = timeLeft%60;
            tEl.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            
            if(timeLeft <= 0) { endGame(false); return; }
            timeLeft--;
            setTimeout(runTimer, 1000);
        }

        function pick(id, el) {
            playBeep(400, 'sine');
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            selectedId = id;
            selectedBtn = el;
            el.classList.add('active');
        }

        function check(zoneId, box) {
            if(!selectedId) {
                document.getElementById('board').classList.add('shake');
                setTimeout(() => document.getElementById('board').classList.remove('shake'), 300);
                return;
            }

            if(selectedId === zoneId) {
                playBeep(800, 'sine');
                box.classList.add('filled');
                box.innerText = selectedBtn.innerText;
                box.onclick = null;
                selectedBtn.classList.add('done');
                selectedId = null;
                score++;
                document.getElementById('score').innerText = `Mastery: ${score}/7`;
                if(score === 7) endGame(true);
            } else {
                playBeep(150, 'sawtooth');
                timeLeft -= 5; // Time Penalty
                box.classList.add('shake');
                if(navigator.vibrate) navigator.vibrate(200);
                setTimeout(() => box.classList.remove('shake'), 300);
            }
        }

        function endGame(won) {
            timerActive = false;
            document.getElementById('scr-game').classList.add('hidden');
            document.getElementById('scr-end').classList.remove('hidden');
            
            const title = document.getElementById('res-title');
            const msg = document.getElementById('res-msg');
            
            if(won) {
                title.innerText = "MISSION SUCCESS! 🏆";
                title.style.color = "#2ecc71";
                msg.innerText = `Aapne ${60 - timeLeft}s mein heart diagram master kar liya!`;
            } else {
                title.innerText = "TIME OUT! ⌛";
                title.style.color = "#ff4757";
                msg.innerText = `Koshish acchi thi. Score: ${score}/7. Dubara koshish karein.`;
            }
        }
    </script>
</body>
</html>
