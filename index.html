<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Heart Mastery</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff4757;
            --green: #2ecc71;
            --dark: #1e272e;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--dark);
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Screens */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--dark);
            transition: 0.5s ease;
            z-index: 10;
        }

        .hidden { opacity: 0; pointer-events: none; transform: scale(0.9); }

        /* Welcome UI */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 500px;
        }

        h1 { font-size: 3rem; color: var(--red); margin: 0; text-shadow: 0 0 20px rgba(255,71,87,0.4); }

        .btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,71,87,0.5); }

        /* Game HUD */
        .hud {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
            background: rgba(0,0,0,0.3);
            padding: 10px 30px;
            border-radius: 50px;
        }

        /* Label Bank */
        .bank {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            max-width: 900px;
        }

        .chip {
            padding: 10px 20px;
            border: 2px solid var(--red);
            color: var(--red);
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            background: transparent;
        }

        .chip.selected { background: var(--red); color: white; transform: translateY(-5px); }
        .chip.correct-fade { opacity: 0; pointer-events: none; transform: scale(0.8); }

        /* Board */
        .board {
            position: relative;
            width: 800px;
            height: 500px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 5px solid white;
        }

        #heart-img { width: 100%; height: 100%; object-fit: contain; }

        /* Drop Zones (Based on your image image_9fb95e.png) */
        .target {
            position: absolute;
            border: 2px dashed #ccc;
            background: rgba(255,255,255,0.7);
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            color: #666;
            transition: 0.3s;
            text-align: center;
        }

        .target:hover { border-color: var(--red); background: white; }
        .target.correct { 
            background: var(--green) !important; 
            border: 2px solid #16a085 !important; 
            color: white !important; 
            font-size: 13px;
        }

        /* Coordinates (Proportional %) */
        .t1 { top: 21%; left: 5%; width: 22%; height: 10%; } /* Brachiocephalic vein */
        .t2 { top: 46%; left: 3%; width: 20%; height: 8%; }  /* Right Atrium */
        .t3 { top: 78%; left: 10%; width: 21%; height: 8%; } /* Left Atrium (Bottom) */
        .t4 { top: 18%; left: 72%; width: 22%; height: 8%; } /* Pulmonary Truck */
        .t5 { top: 35%; left: 72%; width: 20%; height: 8%; } /* Left Atrium (Top) */
        .t6 { top: 60%; left: 72%; width: 20%; height: 8%; } /* Left Ventricle */
        .t7 { top: 80%; left: 72%; width: 22%; height: 8%; } /* Top of heart */

        /* Juicy Animations */
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }

    </style>
</head>
<body>

    <div id="scr-start" class="screen">
        <div class="glass-panel">
            <h1>HUMAN HEART</h1>
            <p>1. Pick a label from the top.<br>2. Click the matching box on the diagram.<br>3. Complete within 1 minute!</p>
            <button class="btn" onclick="startGame()">START MISSION</button>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div class="hud">
            <div id="timer">Time: 60s</div>
            <div id="score">Score: 0/7</div>
        </div>

        <div class="bank" id="label-bank">
            <button class="chip" id="l1" onclick="selectLabel(this, 'l1')">Brachiocephalic Vein</button>
            <button class="chip" id="l2" onclick="selectLabel(this, 'l2')">Right Atrium</button>
            <button class="chip" id="l3" onclick="selectLabel(this, 'l3')">Left Atrium</button>
            <button class="chip" id="l4" onclick="selectLabel(this, 'l4')">Pulmonary Truck</button>
            <button class="chip" id="l5" onclick="selectLabel(this, 'l5')">Left Atrium</button>
            <button class="chip" id="l6" onclick="selectLabel(this, 'l6')">Left Ventricle</button>
            <button class="chip" id="l7" onclick="selectLabel(this, 'l7')">Top of the Heart</button>
        </div>

        <div class="board" id="game-board">
            <img id="heart-img" src="heart_blank.png" alt="Heart Diagram Blank">
            
            <div class="target t1" onclick="verify('l1', this)">DROP HERE</div>
            <div class="target t2" onclick="verify('l2', this)">DROP HERE</div>
            <div class="target t3" onclick="verify('l3', this)">DROP HERE</div>
            <div class="target t4" onclick="verify('l4', this)">DROP HERE</div>
            <div class="target t5" onclick="verify('l5', this)">DROP HERE</div>
            <div class="target t6" onclick="verify('l6', this)">DROP HERE</div>
            <div class="target t7" onclick="verify('l7', this)">DROP HERE</div>
        </div>
    </div>

    <div id="scr-end" class="screen hidden">
        <div class="glass-panel">
            <h2 id="end-title">Game Over</h2>
            <p id="end-msg"></p>
            <button class="btn" onclick="location.reload()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        let selectedId = null;
        let selectedBtn = null;
        let score = 0;
        let timeLeft = 60;
        let timer = null;

        function startGame() {
            document.getElementById('scr-start').classList.add('hidden');
            document.getElementById('scr-game').classList.remove('hidden');
            
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `Time: ${timeLeft}s`;
                if(timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function selectLabel(btn, id) {
            // Reset all chips
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            // Set current
            selectedId = id;
            selectedBtn = btn;
            btn.classList.add('selected');
        }

        function verify(targetId, box) {
            if(!selectedId) {
                // Shake board if nothing selected
                document.getElementById('game-board').classList.add('shake');
                setTimeout(() => document.getElementById('game-board').classList.remove('shake'), 400);
                return;
            }

            if(selectedId === targetId) {
                // Correct Match
                box.classList.add('correct');
                box.innerText = selectedBtn.innerText;
                box.onclick = null; // Disable future clicks
                
                selectedBtn.classList.add('correct-fade');
                selectedId = null;
                score++;
                document.getElementById('score').innerText = `Score: ${score}/7`;
                
                if(score === 7) endGame(true);
            } else {
                // Wrong Match (Shake box and Vibrate)
                box.classList.add('shake');
                setTimeout(() => box.classList.remove('shake'), 400);
                if(navigator.vibrate) navigator.vibrate(200);
                
                // Penalty
                timeLeft -= 5;
            }
        }

        function endGame(won) {
            clearInterval(timer);
            document.getElementById('scr-game').classList.add('hidden');
            document.getElementById('scr-end').classList.remove('hidden');
            
            const title = document.getElementById('end-title');
            const msg = document.getElementById('end-msg');
            
            if(won) {
                title.innerText = "YOU WON! 🏆";
                title.style.color = "#2ecc71";
                msg.innerText = `Shaandaar! Aapne heart anatomy seekh li with ${timeLeft}s left!`;
            } else {
                title.innerText = "TIME UP! ⌛";
                title.style.color = "#ff4757";
                msg.innerText = `Koshish acchi thi, par timer khatam ho gaya. Score: ${score}/7`;
            }
        }
    </script>
</body>
</html>
