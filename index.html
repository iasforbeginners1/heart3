<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Flow Mastery - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff4757; --green: #2ecc71; --dark: #0a0a0c; --glass: rgba(255, 255, 255, 0.07); }
        
        body { font-family: 'Exo 2', sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* Full Screen Screens */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.4s ease-in-out; z-index: 10; background: var(--dark); }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

        /* UI Beautification */
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); width: 85%; max-width: 500px; }
        
        h1 { font-size: 3.5rem; margin: 0; background: linear-gradient(to right, #ff4757, #ff6b81); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px rgba(255,71,87,0.3)); }

        .btn-start { background: var(--red); color: white; border: none; padding: 18px 45px; font-size: 1.4rem; font-weight: 900; border-radius: 50px; cursor: pointer; transition: 0.3s; margin-top: 25px; box-shadow: 0 10px 20px rgba(255,71,87,0.3); }
        .btn-start:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(255,71,87,0.5); }

        /* Game Board Styles */
        .hud { display: flex; gap: 30px; margin-bottom: 15px; font-size: 1.2rem; font-weight: bold; background: rgba(0,0,0,0.4); padding: 10px 40px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); }
        #timer.warning { color: #f1c40f; animation: pulse 0.5s infinite; }

        .bank { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 900px; padding: 15px; }
        .chip { padding: 10px 20px; background: transparent; border: 2px solid var(--red); color: var(--red); border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.9rem; }
        .chip.active { background: var(--red); color: white; box-shadow: 0 0 15px var(--red); }
        .chip.done { opacity: 0; pointer-events: none; transform: scale(0.8); }

        /* The Board */
        .board-container { position: relative; width: 900px; height: 600px; background: white; border-radius: 20px; border: 8px solid #222; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        #bg-image { width: 100%; height: 100%; object-fit: contain; border-radius: 12px; }

        /* Perfected Hotspots (Percentages for Responsive) */
        .drop-zone { position: absolute; border: 2px dashed rgba(0,0,0,0.2); background: rgba(255, 61, 61, 0.05); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; transition: 0.3s; }
        .drop-zone:hover { border-color: var(--red); background: rgba(255, 61, 61, 0.1); }
        .drop-zone.filled { background: var(--green) !important; border: 2px solid #16a085 !important; color: white !important; font-weight: 900; text-align: center; font-size: 14px; }

        /* Correct Coordinates based on image_9fb95e.png */
        .z1 { top: 12%; left: 3%; width: 20%; height: 10%; } /* Brachiocephalic vein */
        .z2 { top: 46%; left: 3%; width: 20%; height: 10%; } /* Right Atrium */
        .z3 { top: 83%; left: 10%; width: 20%; height: 10%; } /* Left Atrium (Bottom) */
        .z4 { top: 15%; left: 74%; width: 22%; height: 8%; } /* Pulmonary Truck */
        .z5 { top: 38%; left: 74%; width: 22%; height: 8%; } /* Left Atrium (Top) */
        .z6 { top: 64%; left: 74%; width: 22%; height: 8%; } /* Left Ventricle */
        .z7 { top: 86%; left: 74%; width: 22%; height: 8%; } /* Top of the Heart */

        /* Animations */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-5px,0); } 75% { transform: translate(5px,0); } }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
        
        #final-score { font-size: 5rem; color: var(--green); margin: 0; }
    </style>
</head>
<body>

    <div id="scr-start" class="screen">
        <div class="glass-card">
            <h1>HEART FLOW</h1>
            <p style="color: #aaa; margin-top: 10px;">Memory Challenge</p>
            <div style="text-align: left; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; margin: 20px 0;">
                <p>✅ Select a label from top</p>
                <p>✅ Click the correct box on diagram</p>
                <p>⚠️ Mistake = -5 seconds</p>
            </div>
            <button class="btn-start" onclick="initGame()">ENTER THE CORE</button>
        </div>
    </div>

    <div id="scr-game" class="screen hidden">
        <div class="hud">
            <div id="timer">01:00</div>
            <div id="score-text">Score: 0/7</div>
        </div>

        <div class="bank" id="label-bank">
            <button class="chip" id="l1" onclick="pick('l1', this)">Brachiocephalic Vein</button>
            <button class="chip" id="l2" onclick="pick('l2', this)">Right Atrium</button>
            <button class="chip" id="l3" onclick="pick('l3', this)">Left Atrium</button>
            <button class="chip" id="l4" onclick="pick('l4', this)">Pulmonary Truck</button>
            <button class="chip" id="l5" onclick="pick('l5', this)">Left Atrium</button>
            <button class="chip" id="l6" onclick="pick('l6', this)">Left Ventricle</button>
            <button class="chip" id="l7" onclick="pick('l7', this)">Top of the Heart</button>
        </div>

        <div class="board-container" id="main-board">
            <img id="bg-image" src="heart_blank.png" alt="heart_blank.png missing">
            
            <div class="drop-zone z1" onclick="place('l1', this)">?</div>
            <div class="drop-zone z2" onclick="place('l2', this)">?</div>
            <div class="drop-zone z3" onclick="place('l3', this)">?</div>
            <div class="drop-zone z4" onclick="place('l4', this)">?</div>
            <div class="drop-zone z5" onclick="place('l5', this)">?</div>
            <div class="drop-zone z6" onclick="place('l6', this)">?</div>
            <div class="drop-zone z7" onclick="place('l7', this)">?</div>
        </div>
    </div>

    <div id="scr-end" class="screen hidden">
        <div class="glass-card">
            <h2 id="result-title">MISSION COMPLETE</h2>
            <p class="final-score" id="final-val">7/7</p>
            <p id="result-msg" style="color: #aaa;"></p>
            <button class="btn-start" onclick="location.reload()">REBOOT SYSTEM</button>
        </div>
    </div>

    <script>
        let currentId = null;
        let currentBtn = null;
        let score = 0;
        let timeLeft = 60;
        let gameActive = false;

        // Audio Beep System (No external files needed)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function initGame() {
            document.getElementById('scr-start').classList.add('hidden');
            document.getElementById('scr-game').classList.remove('hidden');
            gameActive = true;
            tick();
        }

        function tick() {
            if(!gameActive) return;
            const timerEl = document.getElementById('timer');
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timerEl.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            
            if(timeLeft <= 10) timerEl.classList.add('warning');
            
            if(timeLeft <= 0) endGame(false);
            else {
                timeLeft--;
                setTimeout(tick, 1000);
            }
        }

        function pick(id, el) {
            playSound(440, 'sine');
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            currentId = id;
            currentBtn = el;
            el.classList.add('active');
        }

        function place(zoneId, box) {
            if(!currentId) {
                document.getElementById('main-board').classList.add('shake');
                setTimeout(() => document.getElementById('main-board').classList.remove('shake'), 300);
                return;
            }

            if(currentId === zoneId) {
                // SUCCESS
                playSound(880, 'sine');
                box.classList.add('filled');
                box.innerText = currentBtn.innerText;
                box.onclick = null;
                currentBtn.classList.add('done');
                currentId = null;
                score++;
                document.getElementById('score-text').innerText = `Score: ${score}/7`;
                if(score === 7) endGame(true);
            } else {
                // FAILURE
                playSound(150, 'sawtooth');
                if(navigator.vibrate) navigator.vibrate(200);
                timeLeft -= 5;
                box.classList.add('shake');
                setTimeout(() => box.classList.remove('shake'), 300);
            }
        }

        function endGame(won) {
            gameActive = false;
            document.getElementById('scr-game').classList.add('hidden');
            document.getElementById('scr-end').classList.remove('hidden');
            
            const title = document.getElementById('result-title');
            const msg = document.getElementById('result-msg');
            
            if(won) {
                title.innerText = "YOU MASTERED IT! 🏆";
                title.style.color = "#2ecc71";
                msg.innerText = `Shaandaar! Aapne ${60 - timeLeft} seconds mein poora kiya.`;
            } else {
                title.innerText = "SYSTEM FAILURE ⌛";
                title.style.color = "#ff4757";
                msg.innerText = `Timer khatam ho gaya. Aapne ${score}/7 sahi pehchane.`;
            }
        }
    </script>
</body>
</html>
